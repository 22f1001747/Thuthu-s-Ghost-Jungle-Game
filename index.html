<!DOCTYPE html>
<html>
<head>
<title>Jungle Escape - Final Stable</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

#introContainer {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:10;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

#startBtn, #skipBtn {
  position:absolute;
  padding:12px 20px;
  font-size:18px;
  cursor:pointer;
}

#startBtn { bottom:40px; left:40px; }
#skipBtn { top:20px; right:20px; }

#restartBtn {
 position:absolute;
 top:20px;
 right:20px;
 padding:10px;
 z-index:5;
}
</style>
</head>

<body>

<div id="introContainer">
  <video id="introVideo" playsinline muted>
    <source src="./intro_video.mp4" type="video/mp4">
  </video>

  <button id="startBtn">Start Game</button>
  <button id="skipBtn">Skip</button>
</div>

<button id="restartBtn">Restart</button>
<canvas id="gameCanvas"></canvas>

<script>
// ================= SETUP =================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= LOAD =================
function img(s){ let i=new Image(); i.src=s; return i; }
function snd(s,loop=false){ let a=new Audio(s); a.loop=loop; return a; }

// images
const bg=[img("bg1.png"),img("bg2.png"),img("bg3.png")];
const playerFrames=[img("player_run1.png"),img("player_run2.png")];
const ghostImg=img("ghost.png");
const caveImg=img("cave.png");
const riverImg=img("river.png");

const rockImg=img("rock.png");
const logImg=img("log.png");
const fruitImg=img("fruit.png");
const flowerImg=img("flower.png");

// sounds
const jungle=snd("jungle.mp3",true);
const ghostSound=snd("ghost.wav",true);
const heart=snd("heartbeat.mp3",true);

const fruitS=snd("fruit.wav");
const flowerS=snd("flower.wav");
const rockS=snd("hit_rock.wav");
const logS=snd("hit_log.wav");

const winS=snd("victory.mp3");
const overS=snd("gameover.wav");
const waterS=snd("water.mp3");

// STOP ALL AUDIO INITIALLY
[jungle, ghostSound, heart, fruitS, flowerS, rockS, logS, winS, overS, waterS].forEach(s => {
    s.pause();
    s.currentTime = 0;
});

// ================= GAME STATE =================
let state="intro";
let worldX=0;

let player={x:canvas.width*0.3,y:canvas.height/2,size:200,frame:0,dir:1};
let ghost={x:0,y:0};

let cave={x:1200,y:canvas.height/2};
let river={x:0,y:canvas.height/2,active:false};

let obstacles=[];
let items=[];

let score=0;
let lives=3;
let startTime=null;

let message="";
let keys={};

let freeze=false;
let ghostDelay=true;

// NEW STATES
let showInstructions = false;
let showStory = false;

// ================= INPUT =================
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// Close instructions
document.addEventListener("keydown",(e)=>{
 if(showInstructions){
    showInstructions=false;
    freeze=false;

    state="chase";
    ghostDelay=true;

    setTimeout(()=>{
        ghostDelay=false;
        ghostSound.play();
        heart.play();
    },1000);
 }
});

// ================= INTRO =================
const intro=document.getElementById("introContainer");
const video=document.getElementById("introVideo");

document.getElementById("startBtn").onclick=()=>{
    video.muted = false;
    video.play();

    jungle.pause();
    ghostSound.pause();
    heart.pause();

    document.getElementById("startBtn").style.display="none";
};

document.getElementById("skipBtn").onclick=stopIntro;
video.onended=stopIntro;

function stopIntro(){
    video.pause();
    video.currentTime = 0;

    video.muted = true;
    video.src = "";
    video.load();

    jungle.pause();
    ghostSound.pause();
    heart.pause();

    intro.style.display="none";
    startGame();
}

// ================= START =================
function startGame(){
    jungle.pause();
    ghostSound.pause();
    heart.pause();

    state="explore";
    startTime=Date.now();

    jungle.currentTime = 0;
    jungle.volume = 0.3;
    jungle.play();
}

// ================= SPAWN =================
let lanes=[0.2,0.5,0.8];
let spawnTimer=0;

function spawn(){
 if(state!=="chase") return;

 spawnTimer++;
 if(spawnTimer<60) return;
 spawnTimer=0;

 let y=lanes[Math.floor(Math.random()*3)]*canvas.height;

 obstacles.push({
  x:worldX+canvas.width,
  y:y,
  type:Math.random()<0.5?"rock":"log"
 });

 items.push({
  x:worldX+canvas.width+200,
  y:lanes[Math.floor(Math.random()*3)]*canvas.height,
  type:Math.random()<0.5?"fruit":"flower"
 });
}

// ================= UPDATE =================
function update(){

if(state==="intro" || state==="end" || state==="escaped") return;
if(freeze) return;

if(keys["ArrowRight"]){ worldX+=6; player.dir=1; }
if(keys["ArrowLeft"]){ worldX-=6; player.dir=-1; }
if(keys["ArrowUp"]) player.y-=5;
if(keys["ArrowDown"]) player.y+=5;

player.y=Math.max(50,Math.min(canvas.height-150,player.y));
player.frame+=0.3;

// CAVE ENTRY WITH STORY FLOW
if(state==="explore" && Math.abs(worldX-cave.x)<180){
 state="cave";
 freeze = true;

 ghost.x = worldX - 200;
 ghost.y = player.y;

 showStory = true;

 setTimeout(()=>{
    showStory = false;
    showInstructions = true;
 },2000);
}

if(state==="chase"){

 spawn();

 if(!ghostDelay){
   ghost.x += (worldX - ghost.x)*0.05;
   ghost.y += (player.y - ghost.y)*0.05;
 }

 let gx=ghost.x-worldX+player.x;
 if(Math.abs(gx-player.x)<60 && Math.abs(ghost.y-player.y)<60){
   lives--;
   ghost.x -=150;
 }

 obstacles.forEach(o=>o.x-=6);
 items.forEach(i=>i.x-=6);

 obstacles.forEach((o,i)=>{
  let x=o.x-worldX+player.x;

  if (
  Math.abs(x - player.x) < player.size * 0.6 &&
  Math.abs(player.y - o.y) < player.size * 0.8
){
   if(o.type==="rock"){ score-=3; rockS.play(); }
   else { score-=5; logS.play(); }
   obstacles.splice(i,1);
  }
 });

 items.forEach((it,i)=>{
  let x=it.x-worldX+player.x;

  if (
    Math.abs(x - player.x) < player.size * 0.6 &&
    Math.abs(player.y - it.y) < player.size
  ){
   if(it.type==="fruit"){ score+=3; fruitS.play(); }
   else { score+=2; flowerS.play(); }
   items.splice(i,1);
  }
 });

 if(score<0){ score=0; lives--; }

 if(lives<=0){
   state="end";
   overS.play();
 }

 let t=Math.floor((Date.now()-startTime)/1000);

 if(t===90){
   message="River ahead! Jump!";
   river.active=true;
   river.x=worldX+canvas.width*0.6;
   waterS.play();
 }

 if(river.active){
   let rx=river.x-worldX+player.x;
   if(Math.abs(rx-player.x)<120){
     state="escaped";
     winS.play();
   }
 }
}
}

// ================= DRAW =================
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

let offset=worldX%canvas.width;
for(let i=0;i<3;i++){
 ctx.drawImage(bg[i],i*canvas.width-offset,0,canvas.width,canvas.height);
}

if(state==="explore"){
 let x=cave.x-worldX+player.x;
 ctx.drawImage(caveImg,x,cave.y,300,300);
}

if(river.active){
 let x=river.x-worldX+player.x;
 ctx.drawImage(riverImg,x,river.y,400,250);
}

obstacles.forEach(o=>{
 let x=o.x-worldX+player.x;
 ctx.drawImage(o.type==="rock"?rockImg:logImg,x,o.y,100,100);
});

items.forEach(i=>{
 let x=i.x-worldX+player.x;
 ctx.drawImage(i.type==="fruit"?fruitImg:flowerImg,x,i.y,70,70);
});

// PLAYER
let frame=playerFrames[Math.floor(player.frame)%2];
ctx.drawImage(frame,player.x,player.y,player.size,player.size);

// GHOST
if(state==="chase"){
 let gx=ghost.x-worldX+player.x;
 ctx.drawImage(ghostImg,gx,ghost.y,130,130);
}

// STORY SCREEN
if(showStory){
 ctx.fillStyle="rgba(0,0,0,0.85)";
 ctx.fillRect(canvas.width/2-400,canvas.height/2-150,800,200);

 ctx.fillStyle="red";
 ctx.font="26px Arial";
 ctx.fillText("You entered the wrong place...",canvas.width/2-220,canvas.height/2-60);
 ctx.fillText("You disturbed something...",canvas.width/2-210,canvas.height/2-20);

 ctx.fillStyle="yellow";
 ctx.fillText("NOW RUN FOR YOUR LIFE!",canvas.width/2-200,canvas.height/2+40);
}

// INSTRUCTIONS
if(showInstructions){
 ctx.fillStyle="rgba(0,0,0,0.9)";
 ctx.fillRect(canvas.width/2-400,canvas.height/2-220,800,400);

 ctx.fillStyle="white";
 ctx.font="26px Arial";
 ctx.fillText("Escape the Ghost!",canvas.width/2-140,canvas.height/2-170);

 ctx.font="18px Arial";

 ctx.fillText("1. Use RIGHT arrow → to run from the ghost",canvas.width/2-350,canvas.height/2-110);
 ctx.fillText("2. Use UP and DOWN arrows to avoid obstacles and collect energy",canvas.width/2-350,canvas.height/2-70);
 ctx.fillText("3. Rocks and wooden logs ahead. Avoid hitting them to save points.",canvas.width/2-350,canvas.height/2-20);
 ctx.fillText("4. Fruits and flowers ahead. Collect them to increase points.",canvas.width/2-350,canvas.height/2+30);

 ctx.fillStyle="yellow";
 ctx.fillText("Press ANY KEY to start!",canvas.width/2-140,canvas.height/2+120);
}

// UI
let t=startTime ? Math.floor((Date.now()-startTime)/1000) : 0;
ctx.fillStyle="white";
ctx.font="24px Arial";
ctx.fillText("Time: "+t,20,40);
ctx.fillText("Score: "+score,20,70);
ctx.fillText("Lives: "+lives,20,100);

// END
if(state==="end"){
 ctx.fillStyle="red";
 ctx.font="60px Arial";
 ctx.fillText("GAME OVER",canvas.width/2-200,canvas.height/2);
}

if(state==="escaped"){
 ctx.fillStyle="lightgreen";
 ctx.font="60px Arial";
 ctx.fillText("ESCAPED!",canvas.width/2-200,canvas.height/2);
}
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

document.getElementById("restartBtn").onclick=()=>location.reload();

</script>

</body>
</html>
