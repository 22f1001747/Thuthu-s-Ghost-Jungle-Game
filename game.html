<!DOCTYPE html>
<html>
<head>
<title>Jungle Escape - Complete Game</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#restartBtn {
    position:absolute;
    top:20px;
    right:20px;
    display:none;
    padding:10px;
}
</style>
</head>

<body>

<button id="restartBtn">Restart</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== IMAGES =====
function img(src){ let i=new Image(); i.src=src; return i;}

const bg1 = img("bg1.png");
const bg2 = img("bg2.png");
const bg3 = img("bg3.png");

const player1 = img("player_run1.png");
const player2 = img("player_run2.png");
const ghostImg = img("ghost.png");
const caveImg = img("cave.png");
const rockImg = img("rock.png");
const logImg = img("log.png");
const fruitImg = img("fruit.png");
const flowerImg = img("flower.png");

// ===== WORLD =====
let worldX = 0;

// ===== PLAYER =====
let player = {
    x: canvas.width * 0.3,
    y: canvas.height/2,
    size: 120,
    speed: 6,
    baseSpeed: 6,
    boostSpeed: 10,
    jumping: false,
    jumpHeight: 0,
    frame: 0,
    direction: "right"
};

// ===== ENERGY =====
let energy = 0;
let maxEnergy = 100;
let boosting = false;

// ===== GAME STATE =====
let phase = "explore";
let gameOver = false;

// ===== OBJECTS =====
let cave = { x: 2000, y: canvas.height/2 };

let ghost = {
    x: 2000,
    y: canvas.height/2,
    speed: 2,
    active: false
};

let exit = { x: 0, y: 0, active: false };

let obstacles = [];
let items = [];

// ===== UI =====
let message = "";
let messageTime = 0;
let chaseStartTime = 0;

let score = 0;
let startTime = 0;
let timeSurvived = 0;

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

document.getElementById("restartBtn").onclick = () => location.reload();

// ===== SPAWN =====
function spawn(){

    if (phase !== "chase") return;

    if (obstacles.length > 4 || items.length > 4) return;

    let lanes = [
        canvas.height * 0.35,
        canvas.height * 0.5,
        canvas.height * 0.7
    ];

    let laneY = lanes[Math.floor(Math.random()*lanes.length)];

    if (Math.random() < 0.05){
        obstacles.push({
            x: worldX + canvas.width + 300,
            y: laneY,
            type: Math.random()<0.5 ? "rock" : "log"
        });
    }

    if (Math.random() < 0.05){
        items.push({
            x: worldX + canvas.width + 500,
            y: laneY,
            type: Math.random()<0.5 ? "fruit" : "flower"
        });
    }
}

// ===== UPDATE =====
function update(){

    if (gameOver) return;

    // BOOST SYSTEM
    if (keys["Shift"] && energy > 0){
        player.speed = player.boostSpeed;
        energy -= 1;
    } else {
        player.speed = player.baseSpeed;
    }

    // Movement
    if (keys["ArrowRight"]) {
        worldX += player.speed;
        player.direction = "right";
    }

    if (keys["ArrowLeft"]) {
        worldX -= player.speed;
        player.direction = "left";
    }

    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;

    // Jump
    if (keys[" "] && !player.jumping){
        player.jumping = true;
    }

    if (player.jumping){
        player.jumpHeight += 6;
        if (player.jumpHeight > 50){
            player.jumping = false;
            player.jumpHeight = 0;
        }
    }

    // ENTER CAVE
    if (phase === "explore"){
        if (Math.abs(worldX - cave.x) < 200){
            phase = "warning";
            message = "You entered a wrong place!";
            messageTime = Date.now();
        }
    }

    if (phase === "warning"){
        if (Date.now() - messageTime > 2000){
            phase = "wait";
            message = "RUN!";
            chaseStartTime = Date.now();
        }
    }

    if (phase === "wait"){
        if (Date.now() - chaseStartTime > 2000){
            phase = "chase";
            ghost.active = true;
            startTime = Date.now();
            message = "";
        }
    }

    // ===== CHASE =====
    if (phase === "chase"){

        spawn();

        let dx = worldX - ghost.x;
        let dy = player.y - ghost.y;

        let dist = Math.sqrt(dx*dx + dy*dy);

        let speed = 2 + Math.min(5, dist/50);

        ghost.x += (dx/dist) * speed;
        ghost.y += (dy/dist) * speed;

        // Keep ghost close
        if (dist > canvas.width){
            ghost.x = worldX - 200;
        }

        let gx = ghost.x - worldX + player.x;

        if (Math.abs(gx - player.x) < 60 &&
            Math.abs(ghost.y - player.y) < 60){
            gameOver = true;
            document.getElementById("restartBtn").style.display = "block";
        }

        // Move objects
        obstacles.forEach(o => o.x -= 5);
        items.forEach(i => i.x -= 5);

        // Remove offscreen
        obstacles = obstacles.filter(o => o.x - worldX > -200);
        items = items.filter(i => i.x - worldX > -200);

        // Obstacles
        obstacles.forEach((o,i)=>{
            let ox = o.x - worldX + player.x;

            if (Math.abs(ox - player.x) < 80 &&
                Math.abs(player.y - o.y) < 80){

                if (player.jumping){
                    score += 5;
                    obstacles.splice(i,1);
                } else {
                    gameOver = true;
                }
            }
        });

        // Items
        items.forEach((it,i)=>{
            let ix = it.x - worldX + player.x;

            if (Math.abs(ix - player.x) < 70 &&
                Math.abs(player.y - it.y) < 70){

                score += 5;
                energy = Math.min(maxEnergy, energy + 20);
                items.splice(i,1);
            }
        });

        timeSurvived = Math.floor((Date.now()-startTime)/1000);

        // EXIT SPAWN
        if (timeSurvived > 10 && !exit.active){
            exit.active = true;
            exit.x = worldX + canvas.width + 500;
            exit.y = canvas.height * 0.5;
        }

        // EXIT COLLISION
        if (exit.active){
            let ex = exit.x - worldX + player.x;

            if (Math.abs(ex - player.x) < 80 &&
                Math.abs(exit.y - player.y) < 80){

                alert("YOU ESCAPED!");
                location.reload();
            }
        }
    }

    player.frame += 0.3;
}

// ===== DRAW =====
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let offset = worldX % canvas.width;

    ctx.drawImage(bg1, -offset, 0, canvas.width, canvas.height);
    ctx.drawImage(bg2, canvas.width-offset, 0, canvas.width, canvas.height);
    ctx.drawImage(bg3, canvas.width*2-offset, 0, canvas.width, canvas.height);

    // Cave
    if (phase === "explore"){
        let cx = cave.x - worldX + player.x;
        ctx.drawImage(caveImg, cx, cave.y, 200,200);
    }

    // Exit
    if (exit.active){
        let ex = exit.x - worldX + player.x;
        ctx.shadowColor="cyan";
        ctx.shadowBlur=30;
        ctx.drawImage(caveImg, ex, exit.y, 220,220);
        ctx.shadowBlur=0;
    }

    // Obstacles
    obstacles.forEach(o=>{
        let x = o.x - worldX + player.x;
        let img = o.type==="rock"?rockImg:logImg;

        ctx.shadowColor="red";
        ctx.shadowBlur=20;
        ctx.drawImage(img,x,o.y,120,120);
        ctx.shadowBlur=0;
    });

    // Items
    items.forEach(it=>{
        let x = it.x - worldX + player.x;
        let img = it.type==="fruit"?fruitImg:flowerImg;

        ctx.shadowColor="yellow";
        ctx.shadowBlur=25;
        ctx.drawImage(img,x,it.y,80,80);
        ctx.shadowBlur=0;
    });

    // Player
    let frame = Math.floor(player.frame)%2===0?player1:player2;

    ctx.save();
    if (player.direction==="left"){
        ctx.scale(-1,1);
        ctx.drawImage(frame,
            -player.x-player.size,
            player.y-player.jumpHeight,
            player.size,
            player.size);
    } else {
        ctx.drawImage(frame,
            player.x,
            player.y-player.jumpHeight,
            player.size,
            player.size);
    }
    ctx.restore();

    // Ghost
    if (ghost.active){
        let gx = ghost.x - worldX + player.x;
        ctx.drawImage(ghostImg,gx,ghost.y,160,160);

        ctx.fillStyle="rgba(0,0,0,0.4)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // UI
    ctx.fillStyle="white";
    ctx.font="24px Arial";
    ctx.fillText("Time: "+timeSurvived+"s",20,40);
    ctx.fillText("Score: "+score,20,70);

    // Energy bar
    ctx.fillStyle="black";
    ctx.fillRect(20,90,200,20);
    ctx.fillStyle="green";
    ctx.fillRect(20,90,2*energy,20);

    if (message){
        ctx.fillStyle="black";
        ctx.fillRect(canvas.width/2-250,60,500,60);

        ctx.fillStyle="yellow";
        ctx.font="28px Arial";
        ctx.fillText(message, canvas.width/2-200,100);
    }

    if (gameOver){
        ctx.fillStyle="red";
        ctx.font="60px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-180,canvas.height/2);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
