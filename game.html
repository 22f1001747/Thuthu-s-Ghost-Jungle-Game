<!DOCTYPE html>
<html>
<head>
<title>Jungle Escape</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#restartBtn {
    position:absolute;
    top:20px;
    right:20px;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<button id="restartBtn">Restart</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== LOAD IMAGES =====
function img(src){ let i=new Image(); i.src=src; return i;}

const bg1 = img("bg1.png");
const bg2 = img("bg2.png");
const bg3 = img("bg3.png");

const player1 = img("player_run1.png");
const player2 = img("player_run2.png");

const ghostImg = img("ghost.png");
const caveImg = img("cave.png");
const riverImg = img("river.png");

const rockImg = img("rock.png");
const logImg = img("log.png");

const fruitImg = img("fruit.png");
const flowerImg = img("flower.png");

// ===== GAME STATE =====
let worldX = 0;
let phase = "explore";

let player = {
    x: canvas.width * 0.3,
    y: canvas.height/2,
    size: 120,
    speed: 6,
    jumping: false,
    jumpHeight: 0,
    frame: 0,
    frozen: false,
    direction: 1
};

let ghost = {
    x: 0,
    y: canvas.height/2,
    active: false
};

let cave = { x: 2000, y: canvas.height/2 };

let river = {
    x: 0,
    y: canvas.height/2,
    active: false
};

let obstacles = [];
let items = [];

let lives = 3;
let score = 0;
let lastLifeScore = 0;

let chaseStartTime = null;
let lastSurvivalTick = 0;

let lastSpawnX = 0;

let message = "";
let messageTime = 0;
let runTime = 0;

let gameOver = false;

// ===== CONTROLS =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

document.getElementById("restartBtn").onclick = () => location.reload();

// ===== LIFE SYSTEM =====
function loseLife(){
    if (gameOver) return;

    lives--;

    if (lives <= 0){
        lives = 0;
        gameOver = true;
    }
}

// ===== SCORE SYSTEM =====
function addScore(points){
    if (gameOver) return;

    score += points;

    if (score < 0){
        score = 0;
        loseLife();
    }

    if (score - lastLifeScore >= 20){
        lives++;
        lastLifeScore = score;
    }
}

// ===== SPAWN =====
function spawn(){

    if (phase !== "chase" || gameOver) return;

    if (worldX - lastSpawnX > 300){

        obstacles.push({
            x: worldX + canvas.width,
            y: Math.random() * (canvas.height - 150),
            type: Math.random()<0.5 ? "rock" : "log"
        });

        items.push({
            x: worldX + canvas.width + 200,
            y: Math.random() * (canvas.height - 100),
            type: Math.random()<0.5 ? "fruit" : "flower"
        });

        lastSpawnX = worldX;
    }
}

// ===== UPDATE =====
function update(){

    if (gameOver) return;

    // movement
    if (!player.frozen){
        if (keys["ArrowRight"]) { worldX += player.speed; player.direction = 1; }
        if (keys["ArrowLeft"]) { worldX -= player.speed; player.direction = -1; }
        if (keys["ArrowUp"]) player.y -= player.speed;
        if (keys["ArrowDown"]) player.y += player.speed;
    }

    player.y = Math.max(50, Math.min(canvas.height - 150, player.y));

    // jump
    if (keys[" "] && !player.jumping){
        player.jumping = true;
    }

    if (player.jumping){
        player.jumpHeight += 6;
        if (player.jumpHeight > 50){
            player.jumping = false;
            player.jumpHeight = 0;
        }
    }

    // ===== CAVE ENTRY =====
    if (phase === "explore"){
        if (Math.abs(worldX - cave.x) < 200){
            phase = "warning";
            player.frozen = true;

            message = "You entered a wrong place...";
            messageTime = Date.now();

            ghost.active = true;
            ghost.x = worldX - 300;
            ghost.y = player.y;
        }
    }

    if (phase === "warning"){
        if (Date.now() - messageTime > 2000){
            phase = "run";
            message = "RUN!";
            runTime = Date.now();
        }
    }

    if (phase === "run"){
        if (Date.now() - runTime > 1000){
            phase = "chase";
            player.frozen = false;
            message = "";
            chaseStartTime = Date.now();
            lastSurvivalTick = 0;
        }
    }

    // ===== CHASE =====
    if (phase === "chase"){

        spawn();

        let dx = worldX - ghost.x;
        let dy = player.y - ghost.y;

        let dist = Math.sqrt(dx*dx + dy*dy);
        let speed = 3 + Math.min(5, dist/40);

        ghost.x += (dx/dist) * speed;
        ghost.y += (dy/dist) * speed;

        let gx = ghost.x - worldX + player.x;

        // ghost catch
        if (Math.abs(gx - player.x) < 60 &&
            Math.abs(ghost.y - player.y) < 60){

            loseLife();
            ghost.x -= 200;
        }

        // move objects
        obstacles.forEach(o => o.x -= 6);
        items.forEach(i => i.x -= 6);

        obstacles = obstacles.filter(o => o.x - worldX > -200);
        items = items.filter(i => i.x - worldX > -200);

        // collisions
        obstacles.forEach((o,i)=>{
            let ox = o.x - worldX + player.x;

            if (Math.abs(ox - player.x) < 80 &&
                Math.abs(player.y - o.y) < 80){

                if (player.jumping){
                    addScore(5);
                } else {
                    if (o.type === "log") addScore(-5);
                    else addScore(-3);
                }

                obstacles.splice(i,1);
            }
        });

        items.forEach((it,i)=>{
            let ix = it.x - worldX + player.x;

            if (Math.abs(ix - player.x) < 70 &&
                Math.abs(player.y - it.y) < 70){

                if (it.type === "fruit") addScore(3);
                else addScore(2);

                items.splice(i,1);
            }
        });

        // survival score
        let time = Math.floor((Date.now()-chaseStartTime)/1000);

        if (time % 3 === 0 && time !== lastSurvivalTick){
            addScore(1);
            lastSurvivalTick = time;
        }

        // warning
        if (time >= 90 && time < 100){
            message = "Ghost can't cross water! Run!";
        }

        // river
        if (time >= 100){
            river.active = true;
            river.x = worldX + canvas.width + 200;
        }

        if (river.active){
            let rx = river.x - worldX + player.x;

            if (Math.abs(rx - player.x) < 100 &&
                Math.abs(river.y - player.y) < 100){

                alert("LEVEL COMPLETE!");
                location.reload();
            }
        }
    }

    player.frame += 0.3;
}

// ===== DRAW =====
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let offset = worldX % canvas.width;

    ctx.drawImage(bg1, -offset, 0, canvas.width, canvas.height);
    ctx.drawImage(bg2, canvas.width-offset, 0, canvas.width, canvas.height);
    ctx.drawImage(bg3, canvas.width*2-offset, 0, canvas.width, canvas.height);

    if (ghost.active){
        ctx.fillStyle="rgba(0,0,0,0.4)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    if (phase === "explore"){
        let cx = cave.x - worldX + player.x;
        ctx.drawImage(caveImg, cx, cave.y, 200,200);
    }

    if (river.active){
        let rx = river.x - worldX + player.x;

        ctx.shadowColor="cyan";
        ctx.shadowBlur=40;
        ctx.drawImage(riverImg, rx, river.y, 250,150);
        ctx.shadowBlur=0;
    }

    obstacles.forEach(o=>{
        let x = o.x - worldX + player.x;
        let img = o.type==="rock"?rockImg:logImg;

        ctx.shadowColor="red";
        ctx.shadowBlur=20;
        ctx.drawImage(img,x,o.y,120,120);
        ctx.shadowBlur=0;
    });

    items.forEach(it=>{
        let x = it.x - worldX + player.x;
        let img = it.type==="fruit"?fruitImg:flowerImg;

        ctx.shadowColor="yellow";
        ctx.shadowBlur=25;
        ctx.drawImage(img,x,it.y,80,80);
        ctx.shadowBlur=0;
    });

    let frame = Math.floor(player.frame)%2===0?player1:player2;

    ctx.save();
    if (player.direction === -1){
        ctx.translate(player.x + player.size, 0);
        ctx.scale(-1,1);
        ctx.drawImage(frame,0,player.y-player.jumpHeight,player.size,player.size);
    } else {
        ctx.drawImage(frame,player.x,player.y-player.jumpHeight,player.size,player.size);
    }
    ctx.restore();

    if (ghost.active){
        let gx = ghost.x - worldX + player.x;
        ctx.drawImage(ghostImg,gx,ghost.y,160,160);
    }

    let time = chaseStartTime ?
        Math.floor((Date.now()-chaseStartTime)/1000) : 0;

    ctx.fillStyle="white";
    ctx.font="24px Arial";
    ctx.fillText("Time: "+time+"s",20,40);
    ctx.fillText("Score: "+score,20,70);
    ctx.fillText("Lives: "+lives,20,100);

    if (message){
        ctx.fillStyle="black";
        ctx.fillRect(canvas.width/2-300,60,600,60);

        ctx.fillStyle="yellow";
        ctx.font="26px Arial";
        ctx.fillText(message, canvas.width/2-280,100);
    }

    if (gameOver){
        ctx.fillStyle="red";
        ctx.font="60px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-180,canvas.height/2);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
